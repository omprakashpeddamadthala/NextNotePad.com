name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate unique date-based tag
        id: datestamp
        run: |
          BASE_DATE=$(date +'%m%d%Y')
          IMAGE="omprakashornold/nextnotepad"

          # Check if the base date tag already exists on Docker Hub
          TAG="${BASE_DATE}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

          if [ "$STATUS" = "200" ]; then
            # Tag exists — find the next available suffix (-1, -2, ...)
            COUNTER=1
            while true; do
              TAG="${BASE_DATE}-${COUNTER}"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")
              if [ "$STATUS" != "200" ]; then
                break
              fi
              COUNTER=$((COUNTER + 1))
            done
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            omprakashornold/nextnotepad:latest
            omprakashornold/nextnotepad:${{ github.sha }}
            omprakashornold/nextnotepad:${{ steps.datestamp.outputs.tag }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

